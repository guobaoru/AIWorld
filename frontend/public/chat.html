<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - 实时聊天室</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .sub-page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .sub-page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 100, 60, 0.2);
        }

        .home-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(0, 100, 60, 0.15);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .home-button:hover {
            background: rgba(0, 100, 60, 0.25);
            transform: translateX(-3px);
            box-shadow: 0 5px 20px rgba(0, 100, 60, 0.2);
        }

        .home-button svg {
            width: 20px;
            height: 20px;
        }

        .sub-page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #E5E4E2;
            margin: 0;
        }

        .chat-container {
            background: rgba(0, 20, 10, 0.8);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            height: 65vh;
            min-height: 500px;
            box-shadow: 0 0 40px rgba(0, 100, 60, 0.15);
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
            font-size: 0.98rem;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(0, 100, 60, 0.2);
            border: 1px solid rgba(0, 100, 60, 0.4);
            color: #E5E4E2;
            border-top-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(0, 173, 216, 0.2);
            border: 1px solid rgba(0, 173, 216, 0.4);
            color: #fff;
            border-top-right-radius: 4px;
        }

        .message-input-area {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(0, 100, 60, 0.3);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 20, 10, 0.6);
            border: 1px solid rgba(0, 100, 60, 0.4);
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .chat-input::placeholder {
            color: #666;
        }

        .send-button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #00643C, #008B5A);
            border: none;
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 100, 60, 0.4);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .system-msg {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin: 8px 0;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            align-self: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="sub-page-container">
        <div class="sub-page-header">
            <a href="index.html" class="home-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回首页
            </a>
            <h1 class="sub-page-title">AI World Hub</h1>
        </div>

        <div class="chat-container">
            <div id="chatMessages" class="chat-messages">
                <div class="system-msg">连接中...</div>
            </div>
            <div class="message-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="输入消息... (@ai 呼叫智能助手)" autocomplete="off">
                <button id="sendBtn" class="send-button">发送</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        let ws;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/api/chat/ws`);

            ws.onopen = () => {
                chatMessages.innerHTML = '';
                addSystemMessage('已连接到 AI World Hub');
                addSystemMessage('提示：发送包含 "@ai" 的消息可唤醒智能助手');
            };

            ws.onmessage = (event) => {
                const msg = event.data;
                // Simple heuristic
                if (msg.startsWith('🤖 AI:')) {
                    addMessage(msg, 'ai');
                } else {
                    // Ideally we should distinguish self vs others, but without ID...
                    // For now, let's just show all user messages as 'user' style
                    addMessage(msg, 'user');
                }
            };

            ws.onclose = () => {
                addSystemMessage('连接断开，3秒后重连...');
                setTimeout(connect, 3000);
            };
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'system-msg';
            div.textContent = text;
            chatMessages.appendChild(div);
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (text && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(text);
                chatInput.value = '';
                // Note: we don't addMessage here because the server broadcasts it back
            }
        }

        const sendBtn = document.getElementById('sendBtn');
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        connect();
    </script>
</body>
</html>
