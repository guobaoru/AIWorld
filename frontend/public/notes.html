<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 笔记 - AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .sub-page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .sub-page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 100, 60, 0.2);
        }

        .home-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(0, 100, 60, 0.15);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .home-button:hover {
            background: rgba(0, 100, 60, 0.25);
            transform: translateX(-3px);
            box-shadow: 0 5px 20px rgba(0, 100, 60, 0.2);
        }

        .home-button svg {
            width: 20px;
            height: 20px;
        }

        .sub-page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #E5E4E2;
            margin: 0;
        }

        .notes-section {
            background: rgba(0, 100, 60, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .notes-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: #E5E4E2;
            margin-bottom: 20px;
        }

        .add-note-form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 100, 60, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: #888;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 12px 16px;
            background: rgba(0, 100, 60, 0.1);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 10px;
            color: #E5E4E2;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #00643C;
            box-shadow: 0 0 15px rgba(0, 100, 60, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #00643C, #008B5A);
            border: none;
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 100, 60, 0.4);
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .note-item {
            background: rgba(0, 100, 60, 0.1);
            border: 1px solid rgba(0, 100, 60, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .note-item:hover {
            border-color: rgba(0, 100, 60, 0.4);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .note-item.completed {
            opacity: 0.6;
        }

        .note-item.completed .note-title,
        .note-item.completed .note-content {
            text-decoration: line-through;
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .note-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #E5E4E2;
            margin-bottom: 5px;
        }

        .note-content {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .note-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            color: #666;
            font-size: 0.85rem;
        }

        .priority-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .priority-low {
            background: rgba(0, 139, 90, 0.2);
            color: #008B5A;
        }

        .priority-medium {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .priority-high {
            background: rgba(255, 68, 68, 0.2);
            color: #FF4444;
        }

        .note-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .action-btn.complete {
            background: rgba(0, 139, 90, 0.2);
            color: #008B5A;
        }

        .action-btn.delete {
            background: rgba(139, 0, 0, 0.2);
            color: #FF4444;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .empty-message {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .note-header {
                flex-direction: column;
                gap: 10px;
            }
            
            .note-actions {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="sub-page-container">
        <div class="sub-page-header">
            <a href="index.html" class="home-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回首页
            </a>
            <h1 class="sub-page-title">AI World - 智能笔记</h1>
        </div>

        <div class="notes-section">
            <h2>添加笔记</h2>
            <form id="noteForm" class="add-note-form">
                <div class="form-group">
                    <label for="noteTitle">标题</label>
                    <input type="text" id="noteTitle" placeholder="输入标题" required>
                </div>
                <div class="form-group">
                    <label for="noteContent">内容</label>
                    <textarea id="noteContent" placeholder="输入笔记内容..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="notePriority">优先级</label>
                        <select id="notePriority">
                            <option value="0">低</option>
                            <option value="1" selected>中</option>
                            <option value="2">高</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="noteTags">标签</label>
                        <input type="text" id="noteTags" placeholder="标签（用逗号分隔）">
                    </div>
                </div>
                <div class="form-group">
                    <label for="noteDueDate">截止日期</label>
                    <input type="date" id="noteDueDate">
                </div>
                <button type="submit" class="submit-btn">添加笔记</button>
            </form>
        </div>

        <div class="notes-section">
            <h2>笔记列表</h2>
            <div id="notesList" class="notes-list">
                <p class="empty-message">暂无笔记</p>
            </div>
        </div>
    </div>

    <script src="./notes.js"></script>
</body>
</html>
