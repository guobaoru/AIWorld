<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账应用 - AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sub-page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .sub-page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 100, 60, 0.2);
        }

        .home-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(0, 100, 60, 0.15);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .home-button:hover {
            background: rgba(0, 100, 60, 0.25);
            transform: translateX(-3px);
            box-shadow: 0 5px 20px rgba(0, 100, 60, 0.2);
        }

        .home-button svg {
            width: 20px;
            height: 20px;
        }

        .sub-page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #E5E4E2;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="sub-page-container">
        <div class="sub-page-header">
            <a href="index.html" class="home-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回首页
            </a>
            <h1 class="sub-page-title">AI World - 智能记账</h1>
        </div>

        <div class="balance-summary">
            <div class="balance-card income">
                <p class="balance-label">收入</p>
                <p class="balance-amount" id="totalIncome">¥0.00</p>
            </div>
            <div class="balance-card expense">
                <p class="balance-label">支出</p>
                <p class="balance-amount" id="totalExpense">¥0.00</p>
            </div>
            <div class="balance-card net">
                <p class="balance-label">结余</p>
                <p class="balance-amount" id="netBalance">¥0.00</p>
            </div>
        </div>

        <div class="analysis-section" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div class="chart-container" style="background: rgba(0, 100, 60, 0.1); padding: 20px; border-radius: 16px; border: 1px solid rgba(0, 100, 60, 0.3);">
                <h3 style="color: #E5E4E2; margin-bottom: 15px; font-family: 'Orbitron', sans-serif;">收支分析</h3>
                <canvas id="expenseChart"></canvas>
            </div>
            <div class="ai-advisor" style="background: rgba(0, 100, 60, 0.1); padding: 20px; border-radius: 16px; border: 1px solid rgba(0, 100, 60, 0.3);">
                <h3 style="color: #00ff88; margin-bottom: 15px; font-family: 'Orbitron', sans-serif;">🤖 AI 财务顾问</h3>
                <div id="aiAdvice" style="color: #ccc; line-height: 1.6;">正在分析您的财务数据...</div>
            </div>
        </div>

        <div class="add-record-section">
            <h2>添加记录</h2>
            <form id="recordForm" class="record-form">
                <div class="form-group">
                    <label>类型</label>
                    <div class="type-toggle">
                        <button type="button" class="type-btn active" data-type="expense">支出</button>
                        <button type="button" class="type-btn" data-type="income">收入</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="amount">金额</label>
                    <input type="number" id="amount" step="0.01" min="0" placeholder="请输入金额" required>
                </div>

                <div class="form-group">
                    <label for="category">分类</label>
                    <select id="category" required>
                        <option value="">请选择分类</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">备注</label>
                    <input type="text" id="description" placeholder="添加备注（可选）">
                </div>

                <div class="form-group">
                    <label for="date">日期</label>
                    <input type="date" id="date" required>
                </div>

                <button type="submit" class="submit-btn">添加记录</button>
            </form>
        </div>

        <div class="records-section">
            <h2>记录列表</h2>
            <div class="records-list" id="recordsList">
                <p class="empty-message">暂无记录</p>
            </div>
        </div>
    </div>

    <script src="./accounting.js"></script>
</body>
</html>
