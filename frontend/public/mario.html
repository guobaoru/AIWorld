<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级马里奥 - AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .sub-page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .sub-page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 100, 60, 0.2);
        }

        .home-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0, 100, 60, 0.15);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 10px;
            color: #E5E4E2;
            font-size: 0.95rem;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .home-button:hover {
            background: rgba(0, 100, 60, 0.25);
            transform: translateX(-3px);
            box-shadow: 0 5px 20px rgba(0, 100, 60, 0.2);
        }

        .home-button svg {
            width: 18px;
            height: 18px;
        }

        .sub-page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #E5E4E2;
            margin: 0;
        }

        .mario-game-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(0, 100, 60, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 20px;
            padding: 25px;
        }

        .top-stats-bar {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(0, 100, 60, 0.2), rgba(0, 139, 90, 0.1));
            border: 1px solid rgba(0, 139, 90, 0.3);
            border-radius: 12px;
            padding: 12px 18px;
            flex: 1;
            min-width: 120px;
        }

        .stat-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 8px rgba(0, 255, 136, 0.3));
        }

        .stat-content {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 2px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .canvas-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
        }

        #gameCanvas {
            border: 3px solid rgba(0, 139, 90, 0.5);
            border-radius: 12px;
            background: #5C94FC;
            box-shadow: 0 0 30px rgba(0, 100, 60, 0.4);
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
        }

        .overlay-content h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: #00ff88;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .overlay-content p {
            color: #888;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #00643C, #008B5A);
            border: none;
            border-radius: 10px;
            color: #E5E4E2;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 139, 90, 0.4);
        }

        .controls-hint {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            padding: 12px 15px;
            background: rgba(0, 100, 60, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(0, 100, 60, 0.2);
        }

        .controls-hint-item {
            color: #888;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls-hint kbd {
            background: rgba(0, 100, 60, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="sub-page-container">
        <div class="sub-page-header">
            <a href="index.html" class="home-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回首页
            </a>
            <h1 class="sub-page-title">AI World - 超级马里奥</h1>
        </div>

        <div class="mario-game-area">
            <div class="top-stats-bar">
                <div class="stat-item">
                    <div class="stat-icon">💰</div>
                    <div class="stat-content">
                        <div class="stat-label">金币</div>
                        <div class="stat-value" id="coins">0</div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-content">
                        <div class="stat-label">分数</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-icon">❤️</div>
                    <div class="stat-content">
                        <div class="stat-label">生命</div>
                        <div class="stat-value" id="lives">3</div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-content">
                        <div class="stat-label">时间</div>
                        <div class="stat-value" id="time">400</div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-content">
                        <div class="stat-label">最高分</div>
                        <div class="stat-value" id="highScore">0</div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-icon">🌍</div>
                    <div class="stat-content">
                        <div class="stat-label">世界</div>
                        <div class="stat-value" id="world">1-1</div>
                    </div>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOverlay" class="game-overlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">超级马里奥</h2>
                        <p id="overlayMessage">第一关 - 地下探险</p>
                        <button id="startBtn" class="btn">开始游戏</button>
                    </div>
                </div>
            </div>

            <div class="controls-hint">
                <div class="controls-hint-item"><kbd>←</kbd><kbd>A</kbd> 向左移动</div>
                <div class="controls-hint-item"><kbd>→</kbd><kbd>D</kbd> 向右移动</div>
                <div class="controls-hint-item"><kbd>↑</kbd><kbd>W</kbd><kbd>空格</kbd> 跳跃</div>
                <div class="controls-hint-item"><kbd>Shift</kbd> 加速跑</div>
            </div>
        </div>
    </div>

    <script src="./mario.js"></script>
</body>
</html>
