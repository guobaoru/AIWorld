<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易自走棋 - AI World</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .sub-page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .sub-page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 100, 60, 0.2);
        }

        .home-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0, 100, 60, 0.15);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 10px;
            color: #E5E4E2;
            font-size: 0.95rem;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .home-button:hover {
            background: rgba(0, 100, 60, 0.25);
            transform: translateX(-3px);
            box-shadow: 0 5px 20px rgba(0, 100, 60, 0.2);
        }

        .home-button svg {
            width: 18px;
            height: 18px;
        }

        .sub-page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #E5E4E2;
            margin: 0;
        }

        .chess-game-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 20px;
            background: rgba(0, 100, 60, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 20px;
            padding: 25px;
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #00ff88;
            margin-bottom: 15px;
            text-align: center;
        }

        .recruit-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .gold-display {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 165, 0, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .gold-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .refresh-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #00643C, #008B5A);
            border: none;
            border-radius: 10px;
            color: #E5E4E2;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 139, 90, 0.4);
        }

        .recruit-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .recruit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 100, 60, 0.15);
            border: 1px solid rgba(0, 139, 90, 0.2);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .recruit-item:hover {
            background: rgba(0, 139, 90, 0.25);
            transform: translateX(5px);
        }

        .piece-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 1.5rem;
        }

        .piece-warrior { background: linear-gradient(135deg, #FF4444, #CC0000); }
        .piece-mage { background: linear-gradient(135deg, #4444FF, #0000CC); }
        .piece-archer { background: linear-gradient(135deg, #44FF44, #00CC00); }

        .piece-info {
            flex: 1;
        }

        .piece-name {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            color: #E5E4E2;
            margin-bottom: 2px;
        }

        .piece-cost {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #FFD700;
        }

        .board-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: rgba(0, 50, 30, 0.3);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid rgba(0, 100, 60, 0.3);
        }

        .board-cell {
            width: 70px;
            height: 70px;
            background: rgba(0, 80, 50, 0.4);
            border: 2px solid rgba(0, 139, 90, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .board-cell:hover {
            background: rgba(0, 139, 90, 0.3);
            border-color: rgba(0, 255, 136, 0.4);
        }

        .board-cell.has-piece {
            cursor: default;
        }

        .board-cell .piece-icon {
            width: 50px;
            height: 50px;
            font-size: 1.8rem;
        }

        .battle-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .health-display {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
        }

        .health-bar {
            margin-bottom: 12px;
        }

        .health-label {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }

        .health-track {
            height: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .health-fill.player { background: linear-gradient(90deg, #00ff88, #00cc66); }
        .health-fill.ai { background: linear-gradient(90deg, #ff4444, #cc0000); }

        .health-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #E5E4E2;
            margin-top: 3px;
        }

        .round-info {
            background: rgba(0, 100, 60, 0.15);
            border: 1px solid rgba(0, 139, 90, 0.2);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .round-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #00ff88;
        }

        .round-result {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }

        .start-battle-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #FF6600, #FF3300);
            border: none;
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .start-battle-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 102, 0, 0.4);
        }

        .start-battle-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
        }

        .overlay-content h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: #00ff88;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .overlay-content p {
            color: #888;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #00643C, #008B5A);
            border: none;
            border-radius: 10px;
            color: #E5E4E2;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 139, 90, 0.4);
        }
    </style>
</head>
<body>
    <div class="sub-page-container">
        <div class="sub-page-header">
            <a href="index.html" class="home-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回首页
            </a>
            <h1 class="sub-page-title">AI World - 简易自走棋</h1>
        </div>

        <div class="chess-game-container">
            <div class="recruit-panel">
                <div class="panel-title">⚔️ 招募区</div>
                <div class="gold-display">
                    <div class="gold-value" id="goldDisplay">10</div>
                    <div style="color: #888; font-size: 0.8rem; font-family: 'Noto Sans SC', sans-serif;">金币</div>
                </div>
                <button class="refresh-btn" id="refreshBtn">🔄 刷新 (1金币)</button>
                <div class="recruit-list" id="recruitList"></div>
            </div>

            <div class="board-panel">
                <div class="panel-title">🎮 5×5 棋盘</div>
                <div class="chess-board" id="chessBoard"></div>
                <button class="start-battle-btn" id="startBattleBtn" style="margin-top: 20px;">⚔️ 开始对战</button>
            </div>

            <div class="battle-panel">
                <div class="panel-title">📊 对战信息</div>
                <div class="health-display">
                    <div class="health-bar">
                        <div class="health-label">玩家生命值</div>
                        <div class="health-track">
                            <div class="health-fill player" id="playerHealthFill" style="width: 100%;"></div>
                        </div>
                        <div class="health-value" id="playerHealthValue">10 / 10</div>
                    </div>
                    <div class="health-bar">
                        <div class="health-label">AI 生命值</div>
                        <div class="health-track">
                            <div class="health-fill ai" id="aiHealthFill" style="width: 100%;"></div>
                        </div>
                        <div class="health-value" id="aiHealthValue">10 / 10</div>
                    </div>
                </div>
                <div class="round-info">
                    <div class="round-number">第 <span id="roundNumber">1</span> 轮</div>
                    <div class="round-result" id="roundResult">准备对战...</div>
                </div>
                <div class="round-info">
                    <div style="font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: #00ff88;">胜利轮数: <span id="winCount">0</span> / 5</div>
                </div>
            </div>
        </div>
    </div>

    <div class="game-overlay" id="gameOverlay">
        <div class="overlay-content">
            <h2 id="overlayTitle">游戏结束</h2>
            <p id="overlayMessage"></p>
            <button id="restartBtn" class="btn">重新开始</button>
        </div>
    </div>

    <script>
        const PIECE_TYPES = {
            warrior: { name: '战士', icon: '🛡️', color: 'warrior', baseHp: 100, baseAtk: 30 },
            mage: { name: '法师', icon: '🔮', color: 'mage', baseHp: 60, baseAtk: 50 },
            archer: { name: '射手', icon: '🏹', color: 'archer', baseHp: 70, baseAtk: 40 }
        };

        const STAR_MULTIPLIER = { 1: 1, 2: 2, 3: 4 };
        const STAR_COST = { 1: 1, 2: 2, 3: 3 };
        const INITIAL_GOLD = 10;
        const REFRESH_COST = 1;
        const INITIAL_HP = 10;
        const WIN_ROUNDS = 5;
        const ROUND_GOLD_REWARD = 5;

        let gameState = {
            gold: INITIAL_GOLD,
            playerHp: INITIAL_HP,
            aiHp: INITIAL_HP,
            round: 1,
            winCount: 0,
            isBattlePhase: false,
            playerBoard: Array(5).fill(null).map(() => Array(5).fill(null)),
            aiBoard: Array(5).fill(null).map(() => Array(5).fill(null)),
            selectedPiece: null,
            recruitPool: []
        };

        const goldDisplay = document.getElementById('goldDisplay');
        const playerHealthFill = document.getElementById('playerHealthFill');
        const playerHealthValue = document.getElementById('playerHealthValue');
        const aiHealthFill = document.getElementById('aiHealthFill');
        const aiHealthValue = document.getElementById('aiHealthValue');
        const roundNumber = document.getElementById('roundNumber');
        const roundResult = document.getElementById('roundResult');
        const winCount = document.getElementById('winCount');
        const refreshBtn = document.getElementById('refreshBtn');
        const startBattleBtn = document.getElementById('startBattleBtn');
        const recruitList = document.getElementById('recruitList');
        const chessBoard = document.getElementById('chessBoard');
        const gameOverlay = document.getElementById('gameOverlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayMessage = document.getElementById('overlayMessage');
        const restartBtn = document.getElementById('restartBtn');

        function createPiece(type, star = 1) {
            const base = PIECE_TYPES[type];
            return {
                type,
                star,
                hp: base.baseHp * STAR_MULTIPLIER[star],
                maxHp: base.baseHp * STAR_MULTIPLIER[star],
                atk: base.baseAtk * STAR_MULTIPLIER[star],
                name: base.name,
                icon: base.icon,
                color: base.color
            };
        }

        function generateRecruitPool() {
            const pool = [];
            const types = Object.keys(PIECE_TYPES);
            for (let i = 0; i < 5; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                const star = Math.random() < 0.6 ? 1 : (Math.random() < 0.7 ? 2 : 3);
                pool.push(createPiece(type, star));
            }
            return pool;
        }

        function renderRecruitList() {
            recruitList.innerHTML = '';
            gameState.recruitPool.forEach((piece, index) => {
                const div = document.createElement('div');
                div.className = 'recruit-item';
                div.innerHTML = `
                    <div class="piece-icon piece-${piece.color}">${piece.icon}</div>
                    <div class="piece-info">
                        <div class="piece-name">${piece.name} ${'⭐'.repeat(piece.star)}</div>
                        <div class="piece-cost">${STAR_COST[piece.star]} 金币</div>
                    </div>
                `;
                div.onclick = () => buyPiece(index);
                recruitList.appendChild(div);
            });
        }

        function buyPiece(index) {
            if (gameState.isBattlePhase) return;
            const piece = gameState.recruitPool[index];
            const cost = STAR_COST[piece.star];
            if (gameState.gold < cost) {
                alert('金币不足！');
                return;
            }
            gameState.gold -= cost;
            gameState.selectedPiece = piece;
            gameState.recruitPool.splice(index, 1);
            updateUI();
            renderRecruitList();
        }

        function renderChessBoard() {
            chessBoard.innerHTML = '';
            for (let y = 0; y < 5; y++) {
                for (let x = 0; x < 5; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'board-cell';
                    const piece = gameState.playerBoard[y][x];
                    if (piece) {
                        cell.classList.add('has-piece');
                        cell.innerHTML = `<div class="piece-icon piece-${piece.color}">${piece.icon}</div>`;
                    } else {
                        cell.onclick = () => placePiece(x, y);
                    }
                    chessBoard.appendChild(cell);
                }
            }
        }

        function placePiece(x, y) {
            if (!gameState.selectedPiece || gameState.isBattlePhase) return;
            gameState.playerBoard[y][x] = gameState.selectedPiece;
            gameState.selectedPiece = null;
            checkAndMerge();
            renderChessBoard();
        }

        function checkAndMerge() {
            const pieceCount = {};
            for (let y = 0; y < 5; y++) {
                for (let x = 0; x < 5; x++) {
                    const piece = gameState.playerBoard[y][x];
                    if (piece) {
                        const key = `${piece.type}-${piece.star}`;
                        pieceCount[key] = pieceCount[key] || { count: 0, positions: [] };
                        pieceCount[key].count++;
                        pieceCount[key].positions.push({ x, y });
                    }
                }
            }

            for (const key in pieceCount) {
                const { count, positions } = pieceCount[key];
                if (count >= 3) {
                    const [type, starStr] = key.split('-');
                    const star = parseInt(starStr);
                    if (star < 3) {
                        const newPiece = createPiece(type, star + 1);
                        positions.slice(3).forEach(pos => {
                            gameState.playerBoard[pos.y][pos.x] = null;
                        });
                        gameState.playerBoard[positions[0].y][positions[0].x] = newPiece;
                        gameState.gold += 2;
                        updateUI();
                        return checkAndMerge();
                    }
                }
            }
        }

        function refreshRecruitPool() {
            if (gameState.isBattlePhase || gameState.gold < REFRESH_COST) return;
            gameState.gold -= REFRESH_COST;
            gameState.recruitPool = generateRecruitPool();
            updateUI();
            renderRecruitList();
        }

        function generateAIBoard() {
            gameState.aiBoard = Array(5).fill(null).map(() => Array(5).fill(null));
            const types = Object.keys(PIECE_TYPES);
            const pieceCount = 3 + Math.floor(gameState.round / 2);
            for (let i = 0; i < pieceCount; i++) {
                let x, y;
                do {
                    x = Math.floor(Math.random() * 5);
                    y = Math.floor(Math.random() * 5);
                } while (gameState.aiBoard[y][x]);
                
                const type = types[Math.floor(Math.random() * types.length)];
                const star = Math.min(3, 1 + Math.floor(gameState.round / 3));
                gameState.aiBoard[y][x] = createPiece(type, star);
            }
        }

        function simulateBattle() {
            const playerPieces = [];
            const aiPieces = [];
            
            for (let y = 0; y < 5; y++) {
                for (let x = 0; x < 5; x++) {
                    if (gameState.playerBoard[y][x]) {
                        playerPieces.push({ ...gameState.playerBoard[y][x], x, y });
                    }
                    if (gameState.aiBoard[y][x]) {
                        aiPieces.push({ ...gameState.aiBoard[y][x], x, y });
                    }
                }
            }

            while (playerPieces.length > 0 && aiPieces.length > 0) {
                for (const p of playerPieces) {
                    if (aiPieces.length === 0) break;
                    const target = aiPieces[0];
                    target.hp -= p.atk;
                    if (target.hp <= 0) {
                        aiPieces.shift();
                    }
                }
                
                for (const p of aiPieces) {
                    if (playerPieces.length === 0) break;
                    const target = playerPieces[0];
                    target.hp -= p.atk;
                    if (target.hp <= 0) {
                        playerPieces.shift();
                    }
                }
            }

            return playerPieces.length > 0;
        }

        function startBattle() {
            if (gameState.isBattlePhase) return;
            
            const hasPieces = gameState.playerBoard.flat().some(p => p !== null);
            if (!hasPieces) {
                alert('请先在棋盘上放置棋子！');
                return;
            }

            gameState.isBattlePhase = true;
            startBattleBtn.disabled = true;
            roundResult.textContent = '战斗中...';
            
            generateAIBoard();
            
            setTimeout(() => {
                const playerWon = simulateBattle();
                
                if (playerWon) {
                    gameState.aiHp--;
                    gameState.winCount++;
                    roundResult.textContent = '🎉 本轮胜利！';
                } else {
                    gameState.playerHp--;
                    roundResult.textContent = '💀 本轮失败...';
                }

                gameState.gold += ROUND_GOLD_REWARD;
                gameState.recruitPool = generateRecruitPool();
                gameState.isBattlePhase = false;
                
                updateUI();
                renderRecruitList();
                checkGameEnd();
                
                if (gameState.playerHp > 0 && gameState.aiHp > 0 && gameState.winCount < WIN_ROUNDS) {
                    gameState.round++;
                    startBattleBtn.disabled = false;
                    roundNumber.textContent = gameState.round;
                }
            }, 1000);
        }

        function checkGameEnd() {
            if (gameState.winCount >= WIN_ROUNDS) {
                showGameOver(true);
            } else if (gameState.playerHp <= 0) {
                showGameOver(false);
            }
        }

        function showGameOver(playerWon) {
            overlayTitle.textContent = playerWon ? '🎉 恭喜获胜！' : '💀 游戏结束';
            overlayMessage.textContent = playerWon 
                ? `成功击败AI ${WIN_ROUNDS} 轮！`
                : `坚持了 ${gameState.round} 轮，获胜 ${gameState.winCount} 轮`;
            gameOverlay.style.display = 'flex';
        }

        function updateUI() {
            goldDisplay.textContent = gameState.gold;
            
            playerHealthFill.style.width = `${(gameState.playerHp / INITIAL_HP) * 100}%`;
            playerHealthValue.textContent = `${gameState.playerHp} / ${INITIAL_HP}`;
            
            aiHealthFill.style.width = `${(gameState.aiHp / INITIAL_HP) * 100}%`;
            aiHealthValue.textContent = `${gameState.aiHp} / ${INITIAL_HP}`;
            
            winCount.textContent = gameState.winCount;
            refreshBtn.disabled = gameState.isBattlePhase;
        }

        function initGame() {
            gameState = {
                gold: INITIAL_GOLD,
                playerHp: INITIAL_HP,
                aiHp: INITIAL_HP,
                round: 1,
                winCount: 0,
                isBattlePhase: false,
                playerBoard: Array(5).fill(null).map(() => Array(5).fill(null)),
                aiBoard: Array(5).fill(null).map(() => Array(5).fill(null)),
                selectedPiece: null,
                recruitPool: generateRecruitPool()
            };
            
            gameOverlay.style.display = 'none';
            startBattleBtn.disabled = false;
            roundNumber.textContent = 1;
            roundResult.textContent = '准备对战...';
            
            updateUI();
            renderRecruitList();
            renderChessBoard();
        }

        refreshBtn.onclick = refreshRecruitPool;
        startBattleBtn.onclick = startBattle;
        restartBtn.onclick = initGame;

        initGame();
    </script>
</body>
</html>
