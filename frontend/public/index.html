<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        .tabs-container {
            display: flex;
            gap: 24px;
            margin-bottom: 30px;
            position: relative;
        }

        .tab-btn {
            padding: 8px 0;
            background: transparent;
            border: none;
            color: #666;
            font-size: 0.9rem;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn:hover {
            color: #aaa;
        }

        .tab-btn.active {
            color: #008B5A;
            font-weight: 600;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00643C, #008B5A);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            border-radius: 1px;
        }

        .tab-btn.active::after {
            width: 100%;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        @media (max-width: 768px) {
            .tabs-container {
                justify-content: center;
                gap: 20px;
            }

            .tab-btn {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div id="three-container"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="logo" id="logoTitle">
                <span class="ai-text">AI</span>
                <span class="world-text">World</span>
            </h1>
            <p class="tagline">提升效率，简化生活</p>
        </header>
        
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="games">🎮 游戏</button>
            <button class="tab-btn" data-tab="tools">🔧 工具</button>
            <button class="tab-btn" data-tab="social">👥 社交</button>
        </div>
        
        <main class="main-content">
            <section id="games" class="tab-content active">
                <section class="card tool-card" onclick="location.href='./tower-defense.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L3 9v13h18V9l-9-7z"/>
                            <rect x="8" y="14" width="8" height="6"/>
                            <circle cx="12" cy="10" r="2"/>
                        </svg>
                    </div>
                    <h2>塔防游戏</h2>
                    <p class="card-description">放置防御塔，抵御敌人进攻</p>
                </section>
                
                <section class="card tool-card" onclick="location.href='./auto-chess.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <circle cx="6.5" cy="6.5" r="2"></circle>
                            <circle cx="17.5" cy="6.5" r="2"></circle>
                            <circle cx="6.5" cy="17.5" r="2"></circle>
                            <circle cx="17.5" cy="17.5" r="2"></circle>
                        </svg>
                    </div>
                    <h2>简易自走棋</h2>
                    <p class="card-description">策略对战游戏，招募棋子，合成升级</p>
                </section>
                
                <section class="card tool-card" onclick="location.href='./mario.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                    </div>
                    <h2>超级马里奥</h2>
                    <p class="card-description">经典冒险游戏，探索世界</p>
                </section>

                <section class="card tool-card" onclick="location.href='./snake.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 12a8 8 0 018-8M8.5 21a8 8 0 01-4.5-9M15.5 21a8 8 0 004.5-9"/>
                            <circle cx="12" cy="12" r="2"/>
                        </svg>
                    </div>
                    <h2>贪吃蛇</h2>
                    <p class="card-description">经典休闲游戏</p>
                </section>

                <section class="card tool-card" onclick="location.href='./tetris.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="6" height="6"></rect>
                            <rect x="9" y="3" width="6" height="6"></rect>
                            <rect x="15" y="3" width="6" height="6"></rect>
                            <rect x="3" y="9" width="6" height="6"></rect>
                            <rect x="9" y="9" width="6" height="6"></rect>
                            <rect x="3" y="15" width="6" height="6"></rect>
                        </svg>
                    </div>
                    <h2>俄罗斯方块</h2>
                    <p class="card-description">经典益智游戏，挑战极限</p>
                </section>

                <section class="card tool-card" onclick="location.href='./shooter.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L8 8H5v3h3l4 4 4-4h3V8h-3L12 2z"></path>
                            <path d="M12 14v8"></path>
                            <path d="M8 18l4-4 4 4"></path>
                        </svg>
                    </div>
                    <h2>雷霆战机</h2>
                    <p class="card-description">经典射击游戏，火力全开</p>
                </section>
            </section>

            <section id="tools" class="tab-content">
                <section class="card tool-card" onclick="location.href='./accounting.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                    </div>
                    <h2>记账应用</h2>
                    <p class="card-description">日常收支管理，自动分类</p>
                </section>

                <section class="card tool-card" onclick="location.href='./notes.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </div>
                    <h2>AI 笔记</h2>
                    <p class="card-description">智能笔记管理，高效记录</p>
                </section>
            </section>

            <section id="social" class="tab-content">
                <section class="card tool-card" onclick="location.href='./chat.html'">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                        </svg>
                    </div>
                    <h2>AI 聊天室</h2>
                    <p class="card-description">与智能助手实时对话</p>
                </section>
            </section>
        </main>
        
        <footer class="footer">
            <p>Powered by AIWorld</p>
        </footer>
    </div>

    <script type="module" src="./app.js"></script>
    <script>
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });
    </script>
</body>
</html>
