<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="three-container"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="logo">
                <span class="ai-text">AI</span>
                <span class="world-text">World</span>
            </h1>
            <p class="tagline">提升效率，简化生活</p>
        </header>
        
        <main class="main-content">
            <section class="card tool-card" id="pingCard">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="3"/>
                        <line x1="21.17" y1="8" x2="12" y2="8"/>
                        <line x1="3.95" y1="6.06" x2="8.54" y2="14"/>
                        <line x1="10.88" y1="21.94" x2="15.46" y2="14"/>
                    </svg>
                </div>
                <h2>彩蛋</h2>
                <p class="card-description">点击发现更多惊喜</p>
            </section>

            <section class="card tool-card" onclick="location.href='./accounting.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <h2>记账应用</h2>
                <p class="card-description">日常收支管理，自动分类</p>
            </section>

            <section class="card tool-card" onclick="location.href='./snake.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 12a8 8 0 018-8M8.5 21a8 8 0 01-4.5-9M15.5 21a8 8 0 004.5-9"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                </div>
                <h2>贪吃蛇</h2>
                <p class="card-description">经典休闲游戏</p>
            </section>
        </main>
        
        <footer class="footer">
            <p>Powered by AIWorld</p>
        </footer>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
