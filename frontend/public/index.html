<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="three-container"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="logo" id="logoTitle">
                <span class="ai-text">AI</span>
                <span class="world-text">World</span>
            </h1>
            <p class="tagline">提升效率，简化生活</p>
        </header>
        
        <main class="main-content">
            <section class="card tool-card" onclick="location.href='./chat.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                </div>
                <h2>AI 聊天室</h2>
                <p class="card-description">与智能助手实时对话</p>
            </section>

            <section class="card tool-card" onclick="location.href='./accounting.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <h2>记账应用</h2>
                <p class="card-description">日常收支管理，自动分类</p>
            </section>

            <section class="card tool-card" onclick="location.href='./snake.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 12a8 8 0 018-8M8.5 21a8 8 0 01-4.5-9M15.5 21a8 8 0 004.5-9"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                </div>
                <h2>贪吃蛇</h2>
                <p class="card-description">经典休闲游戏</p>
            </section>

            <section class="card tool-card" onclick="location.href='./notes.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <h2>AI 笔记</h2>
                <p class="card-description">智能笔记管理，高效记录</p>
            </section>

            <section class="card tool-card" onclick="location.href='./tetris.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="6" height="6"></rect>
                        <rect x="9" y="3" width="6" height="6"></rect>
                        <rect x="15" y="3" width="6" height="6"></rect>
                        <rect x="3" y="9" width="6" height="6"></rect>
                        <rect x="9" y="9" width="6" height="6"></rect>
                        <rect x="3" y="15" width="6" height="6"></rect>
                    </svg>
                </div>
                <h2>俄罗斯方块</h2>
                <p class="card-description">经典益智游戏，挑战极限</p>
            </section>
        </main>
        
        <footer class="footer">
            <p>Powered by AIWorld</p>
        </footer>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
