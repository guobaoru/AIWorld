<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="snake-container">
        <header class="accounting-header">
            <button class="back-btn" onclick="location.href='./index.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                返回
            </button>
            <h1>贪吃蛇</h1>
        </header>

        <div class="snake-game-area">
            <div class="snake-info">
                <div class="score-display">
                    <span class="score-label">分数：</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="high-score-display">
                    <span class="score-label">最高分：</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOverlay" class="game-overlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">按开始游戏</h2>
                        <p id="overlayMessage">使用方向键控制蛇的移动</p>
                        <button id="startBtn" class="btn btn-primary">开始游戏</button>
                    </div>
                </div>
            </div>

            <div class="snake-controls">
                <div class="control-row">
                    <button class="control-btn" data-direction="up">↑</button>
                </div>
                <div class="control-row">
                    <button class="control-btn" data-direction="left">←</button>
                    <button class="control-btn" data-direction="down">↓</button>
                    <button class="control-btn" data-direction="right">→</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./snake.js"></script>
</body>
</html>
