<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .sub-page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .sub-page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 100, 60, 0.2);
        }

        .home-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(0, 100, 60, 0.15);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .home-button:hover {
            background: rgba(0, 100, 60, 0.25);
            transform: translateX(-3px);
            box-shadow: 0 5px 20px rgba(0, 100, 60, 0.2);
        }

        .home-button svg {
            width: 20px;
            height: 20px;
        }

        .sub-page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #E5E4E2;
            margin: 0;
        }

        .snake-info-section {
            margin-bottom: 25px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, rgba(0, 100, 60, 0.2), rgba(0, 139, 90, 0.1));
            border: 1px solid rgba(0, 139, 90, 0.3);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 139, 90, 0.2);
            border-color: rgba(0, 139, 90, 0.5);
        }

        .stat-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.3));
        }

        .stat-content {
            flex: 1;
        }

        .stat-label {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .leaderboard-btn-container {
            margin-bottom: 25px;
        }

        .leaderboard-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 32px;
            background: linear-gradient(135deg, rgba(0, 100, 60, 0.3), rgba(0, 139, 90, 0.2));
            border: 1px solid rgba(0, 139, 90, 0.4);
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1.1rem;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .leaderboard-btn:hover {
            background: linear-gradient(135deg, #00643C, #008B5A);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 139, 90, 0.3);
        }

        .leaderboard-btn .btn-icon {
            font-size: 1.4rem;
        }

        .leaderboard-btn .btn-text {
            font-family: 'Orbitron', sans-serif;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-icon {
                font-size: 2rem;
            }

            .stat-value {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="sub-page-container">
        <div class="sub-page-header">
            <a href="index.html" class="home-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回首页
            </a>
            <h1 class="sub-page-title">AI World - 贪吃蛇</h1>
        </div>

        <div class="snake-game-area">
            <div class="snake-info-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">🎮</div>
                        <div class="stat-content">
                            <div class="stat-label">当前分数</div>
                            <div class="stat-value" id="score">0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🏆</div>
                        <div class="stat-content">
                            <div class="stat-label">最高分</div>
                            <div class="stat-value" id="highScore">0</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="leaderboard-btn-container">
                <button id="viewLeaderboardBtn" class="leaderboard-btn">
                    <span class="btn-icon">🌍</span>
                    <span class="btn-text">查看全球排行榜</span>
                </button>
            </div>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOverlay" class="game-overlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">按开始游戏</h2>
                        <p id="overlayMessage">使用方向键控制蛇的移动</p>
                        <button id="startBtn" class="btn btn-primary">开始游戏</button>
                    </div>
                </div>
            </div>

            <div class="snake-controls">
                <div class="control-row">
                    <button class="control-btn" data-direction="up">↑</button>
                </div>
                <div class="control-row">
                    <button class="control-btn" data-direction="left">←</button>
                    <button class="control-btn" data-direction="down">↓</button>
                    <button class="control-btn" data-direction="right">→</button>
                </div>
            </div>
        </div>
    </div>

    <div id="leaderboardModal" class="leaderboard-modal">
        <div class="leaderboard-content">
            <div class="leaderboard-header">
                <h2>全球排行榜</h2>
                <button class="close-modal">&times;</button>
            </div>
            
            <div id="submitScoreSection" class="submit-score-section">
                <h3>🎉 新高分！</h3>
                <div class="submit-input-group">
                    <input type="text" id="playerName" class="input-field" placeholder="输入你的名字" maxlength="10">
                    <button id="submitScoreBtn" class="btn btn-primary">提交</button>
                </div>
            </div>

            <ul id="leaderboardList" class="leaderboard-list">
                <!-- 动态生成 -->
            </ul>
        </div>
    </div>

    <script src="./snake.js"></script>
</body>
</html>
