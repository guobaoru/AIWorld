<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="snake-container">
        <a href="index.html" class="floating-home-btn" title="返回首页">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>
        <header>
            <h1>AI World - 贪吃蛇</h1>
        </header>

        <div class="snake-game-area">
            <div class="snake-info">
                <div class="score-display">
                    <span class="score-label">分数：</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="high-score-display">
                    <span class="score-label">最高分：</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">
                <button id="viewLeaderboardBtn" class="btn view-leaderboard-btn" style="margin: 0; flex: 1;">查看全球排行榜</button>
            </div>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOverlay" class="game-overlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">按开始游戏</h2>
                        <p id="overlayMessage">使用方向键控制蛇的移动</p>
                        <button id="startBtn" class="btn btn-primary">开始游戏</button>
                    </div>
                </div>
            </div>

            <div class="snake-controls">
                <div class="control-row">
                    <button class="control-btn" data-direction="up">↑</button>
                </div>
                <div class="control-row">
                    <button class="control-btn" data-direction="left">←</button>
                    <button class="control-btn" data-direction="down">↓</button>
                    <button class="control-btn" data-direction="right">→</button>
                </div>
            </div>
        </div>
    </div>

    <div id="leaderboardModal" class="leaderboard-modal">
        <div class="leaderboard-content">
            <div class="leaderboard-header">
                <h2>全球排行榜</h2>
                <button class="close-modal">&times;</button>
            </div>
            
            <div id="submitScoreSection" class="submit-score-section">
                <h3>🎉 新高分！</h3>
                <div class="submit-input-group">
                    <input type="text" id="playerName" class="input-field" placeholder="输入你的名字" maxlength="10">
                    <button id="submitScoreBtn" class="btn btn-primary">提交</button>
                </div>
            </div>

            <ul id="leaderboardList" class="leaderboard-list">
                <!-- 动态生成 -->
            </ul>
        </div>
    </div>

    <script src="./snake.js"></script>
</body>
</html>
