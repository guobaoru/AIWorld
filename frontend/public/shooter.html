<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷霆战机 - AIWorld</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .sub-page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .sub-page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 100, 60, 0.2);
        }

        .home-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(0, 100, 60, 0.15);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .home-button:hover {
            background: rgba(0, 100, 60, 0.25);
            transform: translateX(-3px);
            box-shadow: 0 5px 20px rgba(0, 100, 60, 0.2);
        }

        .home-button svg {
            width: 20px;
            height: 20px;
        }

        .sub-page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #E5E4E2;
            margin: 0;
        }

        .shooter-game-area {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 25px;
            background: rgba(0, 100, 60, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 100, 60, 0.3);
            border-radius: 20px;
            padding: 30px;
        }

        .shooter-info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, rgba(0, 100, 60, 0.2), rgba(0, 139, 90, 0.1));
            border: 1px solid rgba(0, 139, 90, 0.3);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 139, 90, 0.2);
            border-color: rgba(0, 139, 90, 0.5);
        }

        .stat-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.3));
        }

        .stat-content {
            flex: 1;
        }

        .stat-label {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .canvas-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
        }

        #gameCanvas {
            border: 3px solid rgba(0, 139, 90, 0.5);
            border-radius: 12px;
            background: #0a0a0a;
            box-shadow: 0 0 30px rgba(0, 100, 60, 0.4);
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
        }

        .overlay-content h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: #00ff88;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .overlay-content p {
            color: #888;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #00643C, #008B5A);
            border: none;
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 139, 90, 0.4);
        }

        .controls-hint {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 100, 60, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(0, 100, 60, 0.2);
        }

        .controls-hint h4 {
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .controls-hint ul {
            list-style: none;
            padding: 0;
            margin: 0;
            color: #888;
            font-size: 0.85rem;
        }

        .controls-hint li {
            margin-bottom: 5px;
        }

        .controls-hint kbd {
            background: rgba(0, 100, 60, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #00ff88;
        }

        .leaderboard-btn-container {
            margin-top: auto;
        }

        .leaderboard-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 32px;
            background: linear-gradient(135deg, rgba(0, 100, 60, 0.3), rgba(0, 139, 90, 0.2));
            border: 1px solid rgba(0, 139, 90, 0.4);
            border-radius: 12px;
            color: #E5E4E2;
            font-size: 1.1rem;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .leaderboard-btn:hover {
            background: linear-gradient(135deg, #00643C, #008B5A);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 139, 90, 0.3);
        }

        .leaderboard-btn .btn-icon {
            font-size: 1.4rem;
        }

        .leaderboard-btn .btn-text {
            font-family: 'Orbitron', sans-serif;
        }

        @media (max-width: 900px) {
            .shooter-game-area {
                grid-template-columns: 1fr;
            }

            .shooter-info-section {
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div class="sub-page-container">
        <div class="sub-page-header">
            <a href="index.html" class="home-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回首页
            </a>
            <h1 class="sub-page-title">AI World - 雷霆战机</h1>
        </div>

        <div class="shooter-game-area">
            <div class="shooter-info-section">
                <div class="stat-card">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-content">
                        <div class="stat-label">分数</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-content">
                        <div class="stat-label">等级</div>
                        <div class="stat-value" id="level">1</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">❤️</div>
                    <div class="stat-content">
                        <div class="stat-label">生命</div>
                        <div class="stat-value" id="lives">3</div>
                    </div>
                </div>

                <div class="controls-hint">
                    <h4>🎮 操作说明</h4>
                    <ul>
                        <li><kbd>←</kbd> / <kbd>→</kbd> / <kbd>A</kbd> / <kbd>D</kbd> 左右移动</li>
                        <li><kbd>↑</kbd> / <kbd>W</kbd> 向上移动</li>
                        <li><kbd>↓</kbd> / <kbd>S</kbd> 向下移动</li>
                        <li><kbd>空格</kbd> 发射子弹</li>
                        <li><kbd>P</kbd> 暂停</li>
                    </ul>
                </div>

                <div class="leaderboard-btn-container">
                    <button id="viewLeaderboardBtn" class="leaderboard-btn">
                        <span class="btn-icon">🌍</span>
                        <span class="btn-text">查看全球排行榜</span>
                    </button>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOverlay" class="game-overlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">雷霆战机</h2>
                        <p id="overlayMessage">按开始游戏</p>
                        <button id="startBtn" class="btn">开始游戏</button>
                    </div>
                </div>
            </div>

            <div class="shooter-info-section">
                <div class="stat-card">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-content">
                        <div class="stat-label">最高分</div>
                        <div class="stat-value" id="highScore">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="leaderboardModal" class="leaderboard-modal">
        <div class="leaderboard-content">
            <div class="leaderboard-header">
                <h2>全球排行榜</h2>
                <button class="close-modal">&times;</button>
            </div>
            
            <div id="submitScoreSection" class="submit-score-section">
                <h3>🎉 新高分！</h3>
                <div class="submit-input-group">
                    <input type="text" id="playerName" class="input-field" placeholder="输入你的名字" maxlength="10">
                    <button id="submitScoreBtn" class="btn btn-primary">提交</button>
                </div>
            </div>

            <ul id="leaderboardList" class="leaderboard-list">
            </ul>
        </div>
    </div>

    <script src="./shooter.js"></script>
</body>
</html>
